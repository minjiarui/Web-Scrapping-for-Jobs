name: Daily BA Job Alert
on:
  schedule:
    - cron: '7 1 * * *'
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'How this run was triggered (manual, refresh)'
        required: false
        default: 'manual'
permissions:
  contents: write
jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Run job alert script
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEARCH_QUERIES: 'business analyst,data analyst'
          SEARCH_COUNTRY: 'sg'
          TRIGGERED_BY: ${{ github.event.inputs.triggered_by || 'scheduled' }}
        run: python scripts/job_alert.py
      - name: Commit updated data files
        run: |
          git config user.name "job-alert-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update job tracker data [skip ci]"
          git pull --rebase origin main
          git push
